name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - name: Verify oc-plugin field on each plugin
        run: |
          for pkg in packages/raccoon-mode packages/troll-mode packages/ogre-mode packages/pigeon-mode packages/creature-modes; do
            grep -q '"oc-plugin"' "$pkg/package.json" || { echo "missing oc-plugin field in $pkg"; exit 1; }
            test -f "$pkg/dist/index.js" || { echo "missing dist/index.js in $pkg"; exit 1; }
            test -f "$pkg/dist/tui.js" || { echo "missing dist/tui.js in $pkg"; exit 1; }
          done
